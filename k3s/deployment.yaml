apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanoclaw
  namespace: nanoclaw
  labels:
    app: nanoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanoclaw
  template:
    metadata:
      labels:
        app: nanoclaw
    spec:
      serviceAccountName: nanoclaw-reader

      # Pin to beelink — always-on, low-latency for Telegram polling
      nodeSelector:
        kubernetes.io/hostname: beelink

      # DNS readiness — Telegram polling makes outbound calls at startup
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup api.telegram.org > /dev/null 2>&1; do echo "waiting for DNS..."; sleep 3; done; echo "DNS ready"']
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        # ── Nanoclaw orchestrator ───────────────────────────────────────
        - name: nanoclaw
          image: maasselacr.azurecr.io/nanoclaw:latest
          imagePullPolicy: Always
          command: ["node", "dist/index.js"]

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

          env:
            - name: ASSISTANT_NAME
              value: "Nanoclaw"
            - name: CHANNEL
              value: "telegram"
            # Docker host → DinD sidecar in same pod
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            # Agent containers need to reach K8s services — use NodePort IPs
            # so spawned Docker containers (which aren't on the K8s overlay) can reach them
            - name: PROMETHEUS_URL
              value: "http://100.125.77.112:30090"
            - name: ALERTMANAGER_URL
              value: "http://100.125.77.112:30093"

          envFrom:
            - secretRef:
                name: nanoclaw-secrets  # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, ANTHROPIC_API_KEY
            - secretRef:
                name: nanoclaw-db       # DATALAKE_READONLY_DSN

          volumeMounts:
            - name: groups
              mountPath: /app/groups
            # Expose SA token so nanoclaw CLAUDE.md commands can use it
            - name: sa-token
              mountPath: /var/run/secrets/nanoclaw-sa
              readOnly: true

          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

        # ── Docker-in-Docker sidecar ────────────────────────────────────
        # Agent containers are spawned here. Requires privileged for dockerd.
        - name: dind
          image: docker:27.5-dind
          args:
            - dockerd
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
            # No TLS — internal pod communication only (loopback)
            - --tls=false
            # Use host network for spawned agent containers so they can reach
            # K8s services (Prometheus, Postgres) via pod's network namespace
            - --default-network=host

          securityContext:
            privileged: true   # Required for DinD — no way around this

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi

          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker

      volumes:
        - name: groups
          persistentVolumeClaim:
            claimName: nanoclaw-groups
        - name: dind-storage
          emptyDir: {}
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600

      imagePullSecrets:
        - name: acr-pull-secret
