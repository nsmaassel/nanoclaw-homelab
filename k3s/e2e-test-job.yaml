apiVersion: batch/v1
kind: Job
metadata:
  name: nanoclaw-e2e-test
  namespace: nanoclaw
  labels:
    app: nanoclaw-e2e-test
spec:
  ttlSecondsAfterFinished: 300   # auto-cleanup after 5 min
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: nanoclaw
      nodeSelector:
        kubernetes.io/hostname: beelink
      restartPolicy: Never

      # DNS readiness — curl hits cluster DNS immediately on start
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup prometheus.monitoring.svc.cluster.local > /dev/null 2>&1; do echo "waiting..."; sleep 2; done']
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }

      containers:
        - name: e2e-test
          image: ghcr.io/nsmaassel/nanoclaw-agent:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              PASS=0
              FAIL=0

              ok()  { echo "  ✅ $1"; PASS=$((PASS+1)); }
              fail(){ echo "  ❌ $1"; FAIL=$((FAIL+1)); }

              echo ""
              echo "═══════════════════════════════════════"
              echo "  Nanoclaw Agent E2E Test"
              echo "═══════════════════════════════════════"

              echo ""
              echo "── Tool availability ───────────────────"
              which kubectl  >/dev/null 2>&1 && ok "kubectl present"  || fail "kubectl missing"
              which curl     >/dev/null 2>&1 && ok "curl present"     || fail "curl missing"
              which psql     >/dev/null 2>&1 && ok "psql present"     || fail "psql missing"
              which python3  >/dev/null 2>&1 && ok "python3 present"  || fail "python3 missing"
              which jq       >/dev/null 2>&1 \
                && ok "jq present (pre-installed)" \
                || echo "  ⚠️  jq not pre-installed (use python3 -c 'import json' instead — no internet in agent container)"

              echo ""
              echo "── kubectl cluster access ──────────────"
              kubectl get nodes --no-headers 2>&1 | grep -q "Ready" \
                && ok "kubectl can list nodes" \
                || fail "kubectl cannot list nodes"
              kubectl get pods -n nanoclaw --no-headers 2>&1 | grep -q "nanoclaw" \
                && ok "kubectl can list nanoclaw pods" \
                || fail "kubectl cannot list nanoclaw pods"

              echo ""
              echo "── Prometheus connectivity ─────────────"
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                http://prometheus.monitoring.svc.cluster.local:9090/-/ready 2>/dev/null)
              [ "$HTTP" = "200" ] \
                && ok "Prometheus ready (HTTP $HTTP)" \
                || fail "Prometheus not reachable (HTTP $HTTP)"

              echo ""
              echo "── Alertmanager connectivity ───────────"
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                http://alertmanager.monitoring.svc.cluster.local:9093/-/ready 2>/dev/null)
              [ "$HTTP" = "200" ] \
                && ok "Alertmanager ready (HTTP $HTTP)" \
                || fail "Alertmanager not reachable (HTTP $HTTP)"

              echo ""
              echo "── Data lake (Postgres) ────────────────"
              RESULT=$(psql "$DATALAKE_READONLY_DSN" -t -c \
                "SELECT COUNT(*) FROM silver.activities;" 2>&1)
              echo "$RESULT" | grep -qE "^[[:space:]]*[0-9]+" \
                && ok "psql can query silver.activities (rows: $(echo $RESULT | tr -d ' '))" \
                || fail "psql cannot query data lake: $RESULT"

              echo ""
              echo "── PromQL sanity check ─────────────────"
              RESULT=$(curl -sf \
                'http://prometheus.monitoring.svc.cluster.local:9090/api/v1/query?query=up' \
                2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['data']['result']))" 2>/dev/null)
              [ -n "$RESULT" ] && [ "$RESULT" -gt 0 ] \
                && ok "PromQL 'up' returns $RESULT targets" \
                || fail "PromQL query failed"

              echo ""
              echo "═══════════════════════════════════════"
              echo "  Results: $PASS passed, $FAIL failed"
              echo "═══════════════════════════════════════"
              echo ""

              [ "$FAIL" -eq 0 ] && exit 0 || exit 1

          env:
            - name: DATALAKE_READONLY_DSN
              valueFrom:
                secretKeyRef:
                  name: nanoclaw-db
                  key: DATALAKE_READONLY_DSN

          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }

      imagePullSecrets:
        - name: ghcr-pull-secret
