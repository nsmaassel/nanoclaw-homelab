name: Build & Push NanoClaw Images

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "container/**"
      - "Dockerfile"
      - "package*.json"
      - "tsconfig.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-push:
    name: Build ${{ matrix.service }}
    # Self-hosted ARC runners on beelink-server (no GHA billing)
    runs-on: arc-runner-set-homelab
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nanoclaw-orchestrator
            context: .
            dockerfile: Dockerfile
            image: ghcr.io/nsmaassel/nanoclaw-orchestrator

          - service: nanoclaw-agent
            context: .
            dockerfile: container/Dockerfile
            image: ghcr.io/nsmaassel/nanoclaw-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            KUBECTL_VERSION=v1.32.0
